<section class="addSection">
  <div class="addContainer">
    <div class="adding">
      <form action="" class="addBySearching">
        <input
          type="text"
          name=""
          placeholder="title"
          class="titleOnSearch"
          required
        />
        <input
          type="text"
          name="category"
          placeholder="Category"
          class="categoryOnSearch"
        />
        <button type="button" class="searchToAdd">Search</button>
      </form>

      <p class="otherOption">Or</p>
      <button type="button" class="manuallyAdd">Manually Add</button>
    </div>

    <div class="addingPreview"></div>
  </div>
</section>

<div class="manualWrapper">
  <form action="" class="addByManualData">
    <input
      type="text"
      name=""
      placeholder="title"
      class="titleOnManual"
      required
    />
    <input
      type="text"
      name=""
      placeholder="Write the description"
      class="descriptionOnManual"
    />
    <input type="text" name="" placeholder="Status" class="statusOnManual" />
    <input
      type="text"
      name=""
      placeholder="The category"
      placeholder="type"
      class="typeOnManual"
    />
    <input
      type="text"
      name=""
      placeholder="Airing status"
      class="airingstatusOnManual"
    />
    <input
      type="text"
      name=""
      placeholder="Released At"
      class="releasedatOnManual"
    />
    <input
      type="text"
      name=""
      placeholder="Fisnished At"
      class="finishedatOnManual"
    />
    <input type="text" name="" placeholder="Genres" class="genreOnManual" />
    <input
      type="text"
      name=""
      placeholder="Duration"
      class="durationOnManual"
    />
    <input
      type="text"
      name=""
      placeholder="Total Episodes"
      class="totalepisodesOnManual"
    />
    <input
      type="text"
      name=""
      placeholder="Watched Episodes"
      class="bingedepisodesOnManual"
    />
    <button type="button" class="submitOnManual">send</button>
  </form>
</div>
